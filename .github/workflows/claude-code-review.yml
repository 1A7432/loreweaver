name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      # write, not read: posting the review IS the output of this job. The
      # installer's generated default was read-only, so the job went green
      # having produced nothing.
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # The /code-review plugin reads the PR and posts the review through `gh`. Without an
          # explicit allowlist the run ends with permission_denials_count=1 and posts nothing
          # (green job, zero output). Read/Glob/Grep are listed too so narrowing the allowlist
          # doesn't take the file-reading tools down with it.
          claude_args: '--allowed-tools "Bash(gh pr *),Bash(gh api *),Read,Glob,Grep"'
          # TEMPORARY: dumps the full transcript into the CI log so a run that still posts
          # nothing names the tool it was denied. Remove once the lane is confirmed working.
          show_full_output: true
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

