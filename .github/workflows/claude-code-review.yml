name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      # write, not read: posting the review IS the output of this job. The
      # installer's generated default was read-only, so the job went green
      # having produced nothing.
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # The bare slash command ends the run one step short of posting: the plugin fans out
          # to background review agents, and the model ends its turn waiting to be woken when
          # they report ("I'll wait for the notification rather than continuing to poll").
          # Interactively that works; in CI nothing ever wakes it, so the session closes with
          # subtype=success having never reached "validation and the final summary".
          # `--comment` is what posts to the PR. Without it the plugin runs the entire review
          # and prints the report as terminal output only ("No --comment argument was supplied
          # with this invocation, so per the review process no comment was posted") -- a green
          # job, a real review, and a silent PR.
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment

            You are running non-interactively in CI. Nothing will wake you up: if you end your
            turn waiting on a background agent, the session closes and the review is lost. Keep
            working in this one session until the review is actually posted -- poll background
            agents rather than waiting on a notification. Post the result before you finish,
            including an explicit "no issues found" when the diff is clean.
          # The /code-review plugin reads the PR and posts the review through `gh`. With the
          # default allowlist the run ends with permission_denials_count=1 and posts nothing
          # (green job, zero output). Kept deliberately broad -- a narrow list risks denying a
          # different tool and reproducing the same silent failure. Safe here: this is
          # `pull_request`, so fork PRs get no secrets and the token input is empty, and the
          # action refuses to run at all when this file differs from the default branch.
          claude_args: '--allowed-tools "Bash,Read,Glob,Grep,Write,Edit,TodoWrite"'
          # Always surface the review, so "clean diff" and "silently broken" stop looking
          # identical -- the failure mode that made this take four runs to diagnose.
          display_report: true
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

