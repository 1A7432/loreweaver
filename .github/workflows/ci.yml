name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (${{ matrix.python-version }}) — lint + i18n + tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Keep in sync with `requires-python` in pyproject.toml (currently >=3.11).
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      # anthropic + gemini extras so the provider unit tests run; platform SDKs
      # (qq/telegram/discord/feishu) stay optional — adapter tests mock them. The
      # `dev` dependency-group (pytest/ruff) is installed by default; --locked
      # asserts uv.lock is up to date.
      - run: uv sync --locked --extra anthropic --extra gemini
      - name: Ruff
        run: uv run ruff check core infra agent gateway net adapters app.py scripts
      - name: i18n lint (no hardcoded natural-language strings)
        run: uv run python scripts/i18n_lint.py
      - name: Tests (offline — FakeLLM/FakeEmbeddings, no API keys)
        run: uv run pytest -q

  clients:
    name: Clients — TypeScript (bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: protocol (shared)
        working-directory: clients/protocol
        run: bun install && bun test
      - name: tui (OpenTUI)
        working-directory: clients/tui
        run: bun install && bun test && bun run build
