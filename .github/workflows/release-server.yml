name: release-server
# Builds + publishes self-contained, per-platform SERVER bundles (PyInstaller onedir via
# scripts/package_server.py) so a target machine needs no Python/uv/git at all, and so the TUI's
# "Host locally" flow (clients/tui/src/hostLocal.ts) can download one instead of building from
# source. Server bundles are attached to the same immutable, versioned GitHub Release as the
# client assets; the tiny 1a7432.site mirror is intentionally client-only.
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - core/**
      - infra/**
      - agent/**
      - gateway/**
      - net/**
      - app.py
      - scripts/package_server.py
      - loreweaver-server.spec
      - pyproject.toml
      - locales/**
      - rulepacks/**
      - skills/**
      - clients/**
      - .github/workflows/deploy-client.yml
      - .github/workflows/release-server.yml

concurrency:
  # A newer main build may supersede an older main build, but a version tag is
  # immutable release work and must never be cancelled by an unrelated ref.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.asset }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: linux-x64
            file: dist/loreweaver-server-linux-x64.tar.gz
          - os: ubuntu-24.04-arm
            asset: linux-arm64
            file: dist/loreweaver-server-linux-arm64.tar.gz
          - os: macos-14
            asset: macos-arm64
            file: dist/loreweaver-server-macos-arm64.tar.gz
          - os: windows-latest
            asset: windows-x64
            file: dist/loreweaver-server-windows-x64.zip
    steps:
      # fetch-depth: 0 (full history + tags): setuptools-scm (pyproject.toml's
      # [tool.setuptools_scm]) derives the version from `git describe` — the default
      # depth=1 checkout has no tags at all, so every build here would silently report
      # the fallback version instead of the real git-derived one.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true

      # Pinned build contract (scripts/package_server.py's own docstring): this exact two-step
      # sequence produces `dist/<asset>` for whatever platform the runner is.
      - name: uv sync (package + provider extras)
        run: uv sync --extra package --extra anthropic --extra gemini
      - name: Build the server bundle
        run: uv run python scripts/package_server.py --skip-serve-smoke

      - name: Assert the expected asset was produced
        shell: bash
        run: |
          test -f "${{ matrix.file }}" || { echo "::error::expected asset ${{ matrix.file }} was not produced"; exit 1; }
          uv run python -c 'import hashlib, pathlib, sys; p = pathlib.Path(sys.argv[1]); p.with_name(p.name + ".sha256").write_text(f"{hashlib.sha256(p.read_bytes()).hexdigest()}  {p.name}\n")' "${{ matrix.file }}"

      - uses: actions/upload-artifact@v7
        with:
          name: loreweaver-server-${{ matrix.asset }}
          path: |
            ${{ matrix.file }}
            ${{ matrix.file }}.sha256
          if-no-files-found: error

  publish:
    name: Publish
    needs: build
    # No `if:` needed for all-or-nothing: `needs: build` already makes this job SKIP (not just
    # fail) when any matrix leg failed -- fail-fast is off so every leg still runs and reports,
    # but a partial platform set is never published (it would strand users on whichever OS/arch
    # got left out, e.g. "Host locally" download failing on a fresh Windows/arm64 machine only).
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the versioned release + upload server assets
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Resolve Python package version
        id: release
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check "setuptools-scm>=10.2.0"
          version="$(python -m setuptools_scm)"
          exact_tag="$(git describe --tags --exact-match --match 'v*' 2>/dev/null || true)"
          if [[ "$exact_tag" =~ ^v[0-9]+([.][0-9]+)*$ ]]; then
            tag="$exact_tag"
            channel="stable"
          elif [ -n "$exact_tag" ]; then
            # Keep prerelease tags immutable and addressable, but do not let
            # v1.2.3-rc1 replace GitHub's stable `latest` release.
            tag="$exact_tag"
            channel="dev"
          else
            tag="release-${version}"
            channel="dev"
          fi
          {
            echo "version=${version}"
            echo "tag=${tag}"
            echo "channel=${channel}"
            echo "short=$(git rev-parse --short=7 HEAD)"
          } >> "$GITHUB_OUTPUT"

      - name: Flatten artifacts into dist/
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;
          ls -la dist/

      - name: Publish to GitHub Release
        # The public, canonical distribution -- hostLocal.ts follows GitHub's latest release
        # unless TRPG_RELEASE_TAG/TRPG_SERVER_RELEASE_TAG pins a specific release tag.
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          R="${{ github.repository }}"
          TAG="${{ steps.release.outputs.tag }}"
          VERSION="${{ steps.release.outputs.version }}"
          CHANNEL="${{ steps.release.outputs.channel }}"
          if ! gh release view "$TAG" --repo "$R" >/dev/null 2>&1; then
            cat > release-notes.md <<EOF
          Automated ${CHANNEL} release from commit $GITHUB_SHA.

          Install the newest release:
          - macOS/Linux: \`curl -fsSL https://github.com/$R/releases/latest/download/install.sh | bash\`
          - Windows PowerShell: \`irm https://github.com/$R/releases/latest/download/install.ps1 | iex\`

          Pin or roll back by setting \`TRPG_RELEASE_TAG=$TAG\` before running the installer.
          Downloaded archives are verified against their adjacent \`.sha256\` assets.
          EOF
            release_flags=(--prerelease)
            if [ "$CHANNEL" = "stable" ]; then
              release_flags=(--latest)
            fi
            gh release create "$TAG" \
              --repo "$R" \
              --target "$GITHUB_SHA" \
              --title "Loreweaver ${VERSION}" \
              --notes-file release-notes.md \
              "${release_flags[@]}" \
            || gh release view "$TAG" --repo "$R" >/dev/null
          fi
          gh release upload "$TAG" dist/loreweaver-server-* --repo "$R" --clobber

      # NO mirror step for server bundles — deliberately. The 1a7432.site mirror is a small
      # personal VPS on a thin pipe; it carries only the tiny installers + client tarball
      # (deploy-client.yml). The ~50MB per-platform bundles are served by GitHub Releases ONLY
      # (a runner->CN scp of ~200MB crawled for hours and left truncated files on the mirror).
