name: Codex PR review

# Advisory-only, project-aware Codex code review on every contributor PR (owner PRs included --
# cheap, and it dogfoods the pipeline). See scripts/codex_pr_review.sh for the runnable core and
# .github/codex-review-prompt.md for the project-specific review bar this mirrors from CLAUDE.md.
#
# Trigger is `pull_request_target` (not `pull_request`) SO THAT fork PRs get access to the
# CODEX_AUTH_JSON secret -- this makes "never execute the PR's own code" non-negotiable: this
# workflow checks out ONLY the base repo at the base sha (trusted, for context), and reads the
# PR's changes exclusively as TEXT via `gh pr view` / `gh pr diff`. The PR's branch/commits are
# never checked out, installed, or executed -- see scripts/codex_pr_review.sh's header comment.
#
# Fail-open: this job is advisory. It never turns red because of PR content, a missing secret, or
# a Codex/timeout failure -- see the "Check for Codex auth secret" step and the script's own
# fail-open contract. A missing CODEX_AUTH_JSON secret skips silently (no comment at all), so CI
# stays quiet until the owner configures it.
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Codex review
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # Gate every subsequent step on the secret's presence via a step OUTPUT (not a job-level
      # `if: secrets.X != ''`, which GitHub Actions doesn't evaluate reliably at the job level) so
      # this reliably SKIPS -- never fails, never comments -- when no key is configured yet.
      - name: Check for Codex auth secret
        id: check
        env:
          HAS_SECRET: ${{ secrets.CODEX_AUTH_JSON != '' }}
        run: |
          if [ "$HAS_SECRET" = "true" ]; then
            echo "has_secret=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::CODEX_AUTH_JSON secret is not set -- skipping the Codex PR review (silently, by design)."
            echo "has_secret=false" >> "$GITHUB_OUTPUT"
          fi

      # Base repo at the base sha ONLY -- trusted code, used purely as read context for the
      # review. The PR's own commits are never fetched or checked out (see header comment).
      # The infra steps below (checkout / scratch home / npm install) carry continue-on-error so a
      # transient GitHub or npm hiccup degrades to "no review this time" instead of a red X on a
      # contributor's PR — this job is ADVISORY and must never fail red. The run step re-checks
      # each outcome and simply skips when any of them didn't succeed.
      - name: Checkout base repo (trusted context only)
        if: steps.check.outputs.has_secret == 'true'
        id: checkout
        continue-on-error: true
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Set up a scratch CODEX_HOME (auth + minimal config only)
        if: steps.check.outputs.has_secret == 'true'
        id: codex_home
        continue-on-error: true
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          home_dir="$(mktemp -d)"
          umask 077
          printf '%s' "$CODEX_AUTH_JSON" > "$home_dir/auth.json"
          chmod 600 "$home_dir/auth.json"
          # Pinned to the gpt-5.5 review lane at HIGH effort (per-PR review workload; the owner's
          # interactive lane runs xhigh, which is overkill here). No other local state (no
          # mcp_servers, no history, no cache) is copied into this scratch CODEX_HOME. Written via
          # printf (not a heredoc) so the file has no stray leading whitespace from YAML indentation.
          printf 'model = "gpt-5.5"\nmodel_reasoning_effort = "high"\n' > "$home_dir/config.toml"
          chmod 600 "$home_dir/config.toml"
          echo "home=$home_dir" >> "$GITHUB_OUTPUT"

      - name: Install Codex CLI
        if: steps.check.outputs.has_secret == 'true'
        id: install
        continue-on-error: true
        run: npm install -g @openai/codex@0.142.5

      - name: Run the review
        if: >-
          steps.check.outputs.has_secret == 'true' &&
          steps.checkout.outcome == 'success' &&
          steps.codex_home.outcome == 'success' &&
          steps.install.outcome == 'success'
        env:
          CODEX_HOME: ${{ steps.codex_home.outputs.home }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          scripts/codex_pr_review.sh --pr "${{ github.event.pull_request.number }}"

      - name: Clean up scratch CODEX_HOME
        if: always() && steps.codex_home.outputs.home != ''
        run: rm -rf "${{ steps.codex_home.outputs.home }}"
