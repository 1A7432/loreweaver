name: deploy-client
# On every push to main that touches the clients, repackage the terminal-client
# tarball + installers and publish them to the file server so `loreweaver update`
# and the install mirror pick up the latest.
on:
  push:
    branches: [main]
    paths:
      - clients/**
      - .github/workflows/deploy-client.yml
  workflow_dispatch:

concurrency:
  group: deploy-client
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create/update the rolling 'latest' GitHub Release
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Package terminal-client tarball
        # Same layout the one-line installer expects: clients/{package.json,bun.lock,protocol,tui}.
        run: tar czf loreweaver-client.tar.gz clients/package.json clients/bun.lock clients/protocol clients/tui

      - name: Publish to GitHub Release (rolling 'latest')
        # The public, canonical distribution — the one-line installer defaults here.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          R="${{ github.repository }}"
          if gh release view latest --repo "$R" >/dev/null 2>&1; then
            gh release upload latest loreweaver-client.tar.gz clients/install.sh clients/install.ps1 --repo "$R" --clobber
          else
            gh release create latest loreweaver-client.tar.gz clients/install.sh clients/install.ps1 \
              --repo "$R" --title "Loreweaver client (rolling latest)" \
              --notes "Rolling build of the terminal client from main. \`loreweaver update\` tracks this." --latest
          fi

      - name: Set up SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.LW_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          host="${{ secrets.LW_SSH_TARGET }}"; host="${host##*@}"
          ssh-keyscan -H "$host" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Publish tarball + installers
        # ubuntu-latest no longer ships rsync, so use scp.
        run: |
          T="${{ secrets.LW_SSH_TARGET }}"
          scp loreweaver-client.tar.gz clients/install.sh clients/install.ps1 "$T:/var/www/1a7432.site/trpg/"
          ssh "$T" "chmod -R a+rX /var/www/1a7432.site/trpg"
          echo "published → /trpg/loreweaver-client.tar.gz"
