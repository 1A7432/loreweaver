name: deploy-client
# On every release-relevant push to main, repackage the terminal-client tarball +
# installers, attach them to an immutable versioned GitHub Release, and refresh
# the small 1a7432.site mirror so `loreweaver update` can still use a fast latest
# path when the user has not pinned a release.
on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - core/**
      - infra/**
      - agent/**
      - gateway/**
      - net/**
      - app.py
      - scripts/package_server.py
      - loreweaver-server.spec
      - pyproject.toml
      - locales/**
      - rulepacks/**
      - skills/**
      - clients/**
      - .github/workflows/release-server.yml
      - .github/workflows/deploy-client.yml
  workflow_dispatch:

concurrency:
  # A newer main build may supersede an older main build, but a version tag is
  # immutable release work and must never be cancelled by an unrelated ref.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/main' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the versioned release + upload client assets
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: oven-sh/setup-bun@v2

      - name: Resolve Python package version
        id: release
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check "setuptools-scm>=10.2.0"
          version="$(python -m setuptools_scm)"
          exact_tag="$(git describe --tags --exact-match --match 'v*' 2>/dev/null || true)"
          if [[ "$exact_tag" =~ ^v[0-9]+([.][0-9]+)*$ ]]; then
            tag="$exact_tag"
            channel="stable"
          elif [ -n "$exact_tag" ]; then
            # Keep prerelease tags immutable and addressable, but do not let
            # v1.2.3-rc1 replace GitHub's `latest` release.
            tag="$exact_tag"
            channel="prerelease"
          else
            tag="release-${version}"
            # This project publishes usable development builds directly from
            # main. Keep the canonical one-line installer moving with them;
            # only explicitly tagged prereleases stay off the latest channel.
            channel="current"
          fi
          {
            echo "version=${version}"
            echo "tag=${tag}"
            echo "channel=${channel}"
            echo "short=$(git rev-parse --short=7 HEAD)"
          } >> "$GITHUB_OUTPUT"

      - name: Package terminal-client tarball
        # Same layout the one-line installer expects:
        # clients/{package.json,bun.lock,release-version.json,protocol,tui}.
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist/client-build
          mkdir -p dist/client-build/clients
          cp clients/package.json clients/bun.lock dist/client-build/clients/
          cp -R clients/protocol dist/client-build/clients/protocol
          cp -R clients/tui dist/client-build/clients/tui
          cp clients/install.sh dist/install.sh
          cp clients/install.ps1 dist/install.ps1
          python - <<'PY'
          import json
          from pathlib import Path

          tag = "${{ steps.release.outputs.tag }}"
          version = "${{ steps.release.outputs.version }}"
          Path("dist/client-build/clients/release-version.json").write_text(
              json.dumps({"version": version, "tag": tag}, indent=2) + "\n"
          )

          replacements = [
              (Path("dist/install.sh"), 'TRPG_EMBEDDED_RELEASE_TAG=""', f'TRPG_EMBEDDED_RELEASE_TAG="{tag}"'),
              (Path("dist/install.sh"), 'TRPG_EMBEDDED_CLIENT_VERSION=""', f'TRPG_EMBEDDED_CLIENT_VERSION="{version}"'),
              (Path("dist/install.ps1"), '$EmbeddedReleaseTag = ""', f'$EmbeddedReleaseTag = "{tag}"'),
              (Path("dist/install.ps1"), '$EmbeddedClientVersion = ""', f'$EmbeddedClientVersion = "{version}"'),
          ]
          for path, old, new in replacements:
              text = path.read_text()
              if old not in text:
                  raise SystemExit(f"release placeholder {old!r} not found in {path}")
              path.write_text(text.replace(old, new, 1))
          PY
          tar czf dist/loreweaver-client.tar.gz -C dist/client-build clients/package.json clients/bun.lock clients/release-version.json clients/protocol clients/tui
          python - <<'PY'
          import hashlib
          from pathlib import Path

          archive = Path("dist/loreweaver-client.tar.gz")
          digest = hashlib.sha256(archive.read_bytes()).hexdigest()
          Path(f"{archive}.sha256").write_text(f"{digest}  {archive.name}\n")
          replacements = [
              (Path("dist/install.sh"), 'TRPG_EMBEDDED_CLIENT_SHA256=""', f'TRPG_EMBEDDED_CLIENT_SHA256="{digest}"'),
              (Path("dist/install.ps1"), '$EmbeddedClientSha256 = ""', f'$EmbeddedClientSha256 = "{digest}"'),
          ]
          for path, old, new in replacements:
              text = path.read_text()
              if old not in text:
                  raise SystemExit(f"release placeholder {old!r} not found in {path}")
              path.write_text(text.replace(old, new, 1))
          PY

      - name: Publish to GitHub Release
        # The public, canonical distribution. The normal install path follows GitHub's latest
        # release; users can pin or roll back with TRPG_RELEASE_TAG=<release tag>.
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          R="${{ github.repository }}"
          TAG="${{ steps.release.outputs.tag }}"
          VERSION="${{ steps.release.outputs.version }}"
          CHANNEL="${{ steps.release.outputs.channel }}"
          if ! gh release view "$TAG" --repo "$R" >/dev/null 2>&1; then
            cat > release-notes.md <<EOF
          Automated ${CHANNEL} release from commit $GITHUB_SHA.

          Install the newest release:
          - macOS/Linux: \`curl -fsSL https://github.com/$R/releases/latest/download/install.sh | bash\`
          - Windows PowerShell: \`irm https://github.com/$R/releases/latest/download/install.ps1 | iex\`

          Pin or roll back by setting \`TRPG_RELEASE_TAG=$TAG\` before running the installer.
          Downloaded archives are verified against their adjacent \`.sha256\` assets.
          EOF
            # Publish only after the canonical installer/client assets exist. The
            # server workflow may race us to release creation, so neither creator
            # is allowed to expose an asset-incomplete release as Latest.
            release_flags=(--latest=false)
            if [ "$CHANNEL" = "prerelease" ]; then
              release_flags=(--prerelease)
            fi
            gh release create "$TAG" \
              --repo "$R" \
              --target "$GITHUB_SHA" \
              --title "Loreweaver ${VERSION}" \
              --notes-file release-notes.md \
              "${release_flags[@]}" \
            || gh release view "$TAG" --repo "$R" >/dev/null
          fi
          gh release upload "$TAG" dist/loreweaver-client.tar.gz dist/loreweaver-client.tar.gz.sha256 dist/install.sh dist/install.ps1 --repo "$R" --clobber
          if [ "$CHANNEL" != "prerelease" ]; then
            # This workflow owns Latest promotion. At this point both one-line
            # installers and their client payload are available; server assets
            # may arrive later because Host Local can temporarily use source.
            gh release edit "$TAG" --repo "$R" --prerelease=false --latest
          fi

      - name: Set up SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.LW_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          host="${{ secrets.LW_SSH_TARGET }}"; host="${host##*@}"
          ssh-keyscan -H "$host" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Publish tarball + installers
        # Publish every build under its immutable release tag before refreshing the flat
        # compatibility path. Released/pinned installers fall back to `releases/<tag>/`,
        # so a later main/dev deployment cannot replace the archive they verify.
        # ubuntu-latest no longer ships rsync, so use scp.
        run: |
          set -euo pipefail
          T="${{ secrets.LW_SSH_TARGET }}"
          TAG="${{ steps.release.outputs.tag }}"
          case "$TAG" in
            *[!A-Za-z0-9._+-]*) echo "::error::unsafe release tag for mirror path: $TAG"; exit 1 ;;
          esac
          ROOT="/var/www/1a7432.site/trpg"
          FIXED="$ROOT/releases/$TAG"
          ssh "$T" "install -d -m 755 '$FIXED'"
          scp dist/loreweaver-client.tar.gz dist/loreweaver-client.tar.gz.sha256 dist/install.sh dist/install.ps1 "$T:$FIXED/"
          scp dist/loreweaver-client.tar.gz dist/loreweaver-client.tar.gz.sha256 dist/install.sh dist/install.ps1 "$T:/var/www/1a7432.site/trpg/"
          ssh "$T" "chmod -R a+rX '$ROOT'"
          # The React web client was removed; take its old bundle offline (idempotent) so a
          # rebuilt server never re-serves a stale /play pointing at the retired WS entrypoint.
          ssh "$T" "rm -rf /var/www/1a7432.site/play"
          echo "published → /trpg/releases/$TAG/ + /trpg/"
