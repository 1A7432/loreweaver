# Loreweaver — self-hosted AI Game Master / Keeper (WebSocket server on :8787).
#
#   Bring up:   docker compose up -d --build      (or: scripts/deploy.sh)
#   Logs:       docker compose logs -f
#   Stop:       docker compose down
#
# Mint an access key (binds one player/keeper to a room). The ENTRYPOINT is
# already `python -m app`, so pass ONLY the app arguments:
#
#   docker compose run --rm loreweaver --tui-key add --room <room> --name <name>
#   docker compose run --rm loreweaver --tui-key add --room <room> --name <name> --role keeper
#
# Keys are written to /data/keys.toml inside the named volume (shared with the
# running server); a new key is honored on the next client join, no restart.

services:
  loreweaver:
    build: .
    image: loreweaver:latest
    container_name: loreweaver
    restart: unless-stopped
    ports:
      - "8787:8787"          # host:container — clients connect to ws://<host>:8787/
    env_file:
      # Provider/model/key (TRPG_LLM__*) + platform tokens. Optional: with no
      # API key the server runs the bundled offline demo Keeper (FakeLLM).
      - path: .env
        required: false
    volumes:
      - loreweaver-data:/data   # SQLite store + minted keys persist across restarts
      # To use a host directory instead of the named volume, comment the line
      # above and uncomment:
      # - ./data:/data

volumes:
  loreweaver-data:
